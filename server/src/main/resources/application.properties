# Spring application
spring.application.name=smart-campus

server.port=8081

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=500MB

spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus
spring.datasource.username=
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Reduce SQL noise in console; keep only important logs/errors
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR
logging.level.org.hibernate.type.descriptor.sql=ERROR

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jwt.secret=${JWT_SECRET:}

spring.cookie.secure=false
spring.cookie.same-site=Lax
app.auth.face-similarity-threshold=0.4

spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=

# Frontend redirect targets used after OAuth2 callbacks.
app.frontend.base-url=
app.frontend.login-url=
app.frontend.oauth-success-path=
